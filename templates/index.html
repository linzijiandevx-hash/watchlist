<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>{{ name }}</title>
    </head>
    <body>
        <h2>Hello {{ name }}'s Watchlist</h2>
        {# 使用length 过滤器获取 movies 变量的长度 #}
        <p>{{ movies|length }} Titles</p>
        <ul>
            {% for movie in movies %}
                <li>{{ movie.title }}-{{ movie.year }}</li>
            {% endfor %}
        </ul>
        <footer>
            {# href暂时留白，后续再添加 #}
            <p>&copy; 2025 <a href="">{{ name }}</a></p>
        </footer>
    </body>
</html>
